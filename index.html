<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ArcGIS Practice</title>
    <link rel="stylesheet" href="/index.css" />
  </head>

  <body>
    <div class="container">
      <arcgis-map item-id="02b37471d5d84cacbebcccd785460e94">
        <arcgis-zoom slot="top-left"></arcgis-zoom>
        <arcgis-basemap-toggle slot="bottom-right"></arcgis-basemap-toggle>
      </arcgis-map>
      <arcgis-arcade-editor
        script="'Hello'"
        opened-side-panel
      ></arcgis-arcade-editor>
      <arcgis-chart
        layer-item-id="8871626e970a4f3e9d6113ec63a92f2f"
        chart-index="0"
      >
        <arcgis-charts-action-bar slot="action-bar"></arcgis-charts-action-bar>
      </arcgis-chart>
      <arcgis-slider
        min="0"
        max="100"
        show-range-labels
        value-labels-display="always"
        steps="1"
        value-labels-placement="start"
      >
        <arcgis-ticks
          interactive
          slot="content-end"
          style="flex: 1"
          min="0"
          max="100"
          mode="count"
          values="11"
          show-labels
        >
        </arcgis-ticks>
      </arcgis-slider>
    </div>
    <script type="module" src="/main.ts"></script>
  </body>
</html>
